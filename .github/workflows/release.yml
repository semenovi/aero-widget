name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build (Release x64)
        run: msbuild BlurBox.sln /p:Configuration=Release /p:Platform=x64 /m

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: bin/x64/Release/BlurBox.exe
          generate_release_notes: true
